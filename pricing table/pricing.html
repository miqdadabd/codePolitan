<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pricing tier</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Open+Sans:400,600,700">
    <link rel="stylesheet" href="pricing.css">
</head>
<body>
    <div>
        <div class="panel pricing-table">
            <img src="./assets/icon1.png" alt="" class="pricing-img">
            <h2 class="pricing-header">personal</h2>
            <ul class="pricing-features">
                <li class="pricing-features-item">custom domain</li>
                <li class="pricing-features-item">sleep afer 30 mins of inactifity</li>
            </ul>
            <span class="pricing-price">free</span>
            <a href="#/" class="pricing-button">sign up</a>
        </div>
        <div class="panel pricing-table">
            <img src="/pricing table/assets/icon2.png" alt="" class="pricing-img">
            <h2 class="pricing-header">small team</h2>
            <ul class="pricing-features">
                <li class="pricing-features-item">never sleep</li>
                <li class="pricing-features-item">multiply worker for more powerful apps</li>
            </ul>
            <span class="pricing-price">$150</span>
            <a href="#/" class="pricing-button">free trial</a>
        </div><div class="panel pricing-table">
            <img src="/pricing table/assets/icon3.png" alt="" class="pricing-img">
            <h2 class="pricing-header">enterprise</h2>
            <ul class="pricing-features">
                <li class="pricing-features-item">dedicated</li>
                <li class="pricing-features-item">simple horizontal scalability </li>
            </ul>
            <span class="pricing-price">$500</span>
            <a href="#/" class="pricing-button">free trial</a>
        </div>
    </div>
</body>
</html>
